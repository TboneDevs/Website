{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="glass p-8 rounded-2xl border border-zinc-800 shadow-xl">
        <h2 class="text-2xl font-bold mb-6 text-white text-center font-display">
            Admin Login
        </h2>
        
        <form method="POST" action="{{ url_for('login') }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-1">Username/Email</label>
                <input type="text" name="username" required 
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-1">Password</label>
                <input type="password" name="password" required 
                       class="w-full bg-zinc-950 border border-zinc-700 rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all">
            </div>

            <button type="submit" 
                    class="w-full bg-emerald-500 hover:bg-emerald-600 text-zinc-950 font-bold py-2 px-4 rounded-lg transition-colors mt-4">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
