{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto py-16 text-center">
    <h1 class="text-4xl font-bold mb-6 font-display">Welcome to TNNR CPM1</h1>
    <p class="text-zinc-400 mb-10">Access your game editing tools or claim premade accounts below.</p>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Claim Accounts Card -->
        <a href="{{ url_for('premade_accounts') }}" class="glass p-8 rounded-2xl border border-zinc-800 hover:border-emerald-500 transition-all">
            <i class="fa-solid fa-gift text-3xl text-emerald-400 mb-4"></i>
            <h2 class="text-xl font-bold mb-2">Claim Accounts</h2>
            <p class="text-sm text-zinc-400">Get your premade accounts instantly.</p>
        </a>
        
        <!-- Game Editor Card (Links to Login) -->
        <a href="{{ url_for('login') }}" class="glass p-8 rounded-2xl border border-zinc-800 hover:border-emerald-500 transition-all">
            <i class="fa-solid fa-screwdriver-wrench text-3xl text-emerald-400 mb-4"></i>
            <h2 class="text-xl font-bold mb-2">Game Editor</h2>
            <p class="text-sm text-zinc-400">Modify coins, money, achievements and levels.</p>
        </a>
    </div>
</div>
{% endblock %}
