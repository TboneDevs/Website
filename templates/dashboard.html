{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto py-12">
    <div class="glass p-8 rounded-2xl border border-zinc-800">
        <h1 class="text-2xl font-bold mb-2">Game Editor Dashboard</h1>
        <p class="text-zinc-400 mb-8">Editing account: <span class="text-emerald-400">{{ session.get('cpm_email') }}</span></p>
        
        <!-- Example Stat Box -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-800">
                <div class="text-zinc-400 text-sm mb-1">Balance</div>
                <div class="text-4xl font-semibold tabular-nums">
                    {{ "{:,.0f}".format(data.balance | default(0)) }}
                </div>
            </div>
            
            <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-800">
                <div class="text-zinc-400 text-sm mb-1">Coins</div>
                <div class="text-4xl font-semibold tabular-nums">
                    {{ "{:,.0f}".format(data.coins | default(0)) }}
                </div>
            </div>

            <div class="bg-zinc-900 p-6 rounded-xl border border-zinc-800">
                <div class="text-zinc-400 text-sm mb-1">Level</div>
                <div class="text-4xl font-semibold tabular-nums">
                    {{ data.level | default(0) }}
                </div>
            </div>
        </div>
        
        <a href="{{ url_for('logout') }}" class="text-zinc-500 hover:text-red-400 transition-colors text-sm">
            <i class="fa-solid fa-sign-out-alt mr-2"></i>Logout
        </a>
    </div>
</div>
{% endblock %}
