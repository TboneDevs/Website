{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto py-12 text-center">
    <h1 class="text-3xl font-bold mb-4">Claim Free Accounts</h1>
    <p class="mb-8 text-zinc-400">You have {{ claims_left }} claims left today.</p>
    {% if not pool_empty %}
    <form action="{{ url_for('claim_account') }}" method="POST">
        <button type="submit" class="bg-emerald-500 text-black px-8 py-3 rounded-full font-bold">Claim Account</button>
    </form>
    {% else %}
    <p class="text-red-400">No accounts left in the pool.</p>
    {% endif %}
</div>
{% endblock %}
